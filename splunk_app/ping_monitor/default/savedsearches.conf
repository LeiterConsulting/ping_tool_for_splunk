# ============================================================================
# Ping Monitor Saved Searches
# ============================================================================
# These searches use the KV Store settings configured in the Setup page.
# They load configuration from ping_monitor_settings_lookup and use subsearch
# to dynamically get the correct index and sourcetype.
# ============================================================================

# Note: For scheduled searches, we use a pattern where we:
# 1. Load config from KV Store lookup
# 2. Use a subsearch (format) to inject configured values
# 3. Fall back to defaults if not configured

# ============================================================================
# Scheduled search to populate health lookup for correlation
# ============================================================================
[Ping Monitor - Update Health Lookup]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
description = Updates the ping_health_lookup table with current health status for all monitored endpoints. Uses index/sourcetype from Setup configuration.
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = search [| inputlookup ping_monitor_settings_lookup \
| search _key="global" \
| head 1 \
| eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
| fields index, sourcetype \
| format] record_type=summary \
| stats latest(packet_loss_pct) as packet_loss_pct, \
        latest(avg_latency_ms) as avg_latency_ms, \
        latest(target_ip) as target_ip, \
        latest(group) as group, \
        latest(entitytype) as entitytype \
        by hostname \
| eval health_status = case( \
    packet_loss_pct == 0, "Healthy", \
    packet_loss_pct > 0 AND packet_loss_pct < 50, "Degraded", \
    packet_loss_pct >= 50 AND packet_loss_pct < 100, "Critical", \
    packet_loss_pct == 100, "Down", \
    true(), "Unknown" \
) \
| eval last_updated=strftime(now(), "%Y-%m-%d %H:%M:%S") \
| outputlookup ping_health_lookup

# ============================================================================
# Alert: Endpoint Down (100% packet loss)
# ============================================================================
[Ping Monitor - Endpoint Down Alert]
action.email.useNSSubject = 1
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.fields = hostname
alert.suppress.period = 1h
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Alerts when an endpoint has 100% packet loss (completely unreachable). Uses index/sourcetype from Setup configuration.
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
enableSched = 0
quantity = 0
relation = greater than
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = search [| inputlookup ping_monitor_settings_lookup \
| search _key="global" \
| head 1 \
| eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
| fields index, sourcetype \
| format] record_type=summary packet_loss_pct=100 \
| stats latest(_time) as last_seen, values(group) as group, values(target_ip) as ip by hostname \
| eval last_seen_human = strftime(last_seen, \"%Y-%m-%d %H:%M:%S\") \
| table hostname, ip, group, last_seen_human \
| rename last_seen_human as \"Last Seen\"

# ============================================================================
# Alert: High Packet Loss (>25% but <100%)
# ============================================================================
[Ping Monitor - High Packet Loss Alert]
action.email.useNSSubject = 1
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.fields = hostname
alert.suppress.period = 30m
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Alerts when an endpoint experiences more than 25% packet loss. Uses index/sourcetype from Setup configuration.
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
enableSched = 0
quantity = 0
relation = greater than
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = search [| inputlookup ping_monitor_settings_lookup \
| search _key="global" \
| head 1 \
| eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
| fields index, sourcetype \
| format] record_type=summary packet_loss_pct>25 packet_loss_pct<100 \
| stats latest(packet_loss_pct) as packet_loss, latest(_time) as last_seen, values(group) as group by hostname, target_ip \
| eval last_seen_human = strftime(last_seen, \"%Y-%m-%d %H:%M:%S\") \
| table hostname, target_ip, group, packet_loss, last_seen_human \
| rename packet_loss as \"Packet Loss %\", last_seen_human as \"Last Seen\"

# ============================================================================
# Alert: High Latency (>200ms)
# ============================================================================
[Ping Monitor - High Latency Alert]
action.email.useNSSubject = 1
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.fields = hostname
alert.suppress.period = 30m
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Alerts when an endpoint has average latency above 200ms. Uses index/sourcetype from Setup configuration.
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
enableSched = 0
quantity = 0
relation = greater than
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = search [| inputlookup ping_monitor_settings_lookup \
| search _key="global" \
| head 1 \
| eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
| fields index, sourcetype \
| format] record_type=summary avg_latency_ms>200 \
| stats latest(avg_latency_ms) as latency, latest(_time) as last_seen, values(group) as group by hostname, target_ip \
| eval last_seen_human = strftime(last_seen, \"%Y-%m-%d %H:%M:%S\") \
| eval latency = round(latency, 2) \
| table hostname, target_ip, group, latency, last_seen_human \
| rename latency as \"Latency (ms)\", last_seen_human as \"Last Seen\"

# ============================================================================
# Report: Daily Availability Summary
# ============================================================================
[Ping Monitor - Daily Availability Report]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 8 * * *
description = Daily summary of endpoint availability. Uses index/sourcetype from Setup configuration.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = search [| inputlookup ping_monitor_settings_lookup \
| search _key="global" \
| head 1 \
| eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
| fields index, sourcetype \
| format] record_type=summary \
| stats sum(pings_successful) as success, sum(pings_sent) as total, \
        avg(avg_latency_ms) as avg_latency, max(max_latency_ms) as max_latency, \
        values(group) as groups, values(entitytype) as entitytype \
        by hostname, target_ip \
| eval availability = round((success/total)*100, 2) \
| eval avg_latency = round(avg_latency, 2) \
| eval max_latency = round(max_latency, 2) \
| eval status = case( \
    availability == 100, "Healthy", \
    availability >= 90, "Degraded", \
    availability >= 50, "Critical", \
    true(), "Down" \
) \
| sort -availability \
| table status, hostname, target_ip, groups, entitytype, availability, avg_latency, max_latency \
| rename status as \"Status\", availability as \"Availability %\", avg_latency as \"Avg Latency (ms)\", max_latency as \"Max Latency (ms)\"

# ============================================================================
# Report: Weekly Trend Report
# ============================================================================
[Ping Monitor - Weekly Trend Report]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 9 * * 1
description = Weekly trend analysis of network health. Uses index/sourcetype from Setup configuration.
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = search [| inputlookup ping_monitor_settings_lookup \
| search _key="global" \
| head 1 \
| eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
| fields index, sourcetype \
| format] record_type=summary \
| timechart span=1d avg(eval(100-packet_loss_pct)) as availability, avg(avg_latency_ms) as avg_latency by group \
| eval availability = round(availability, 2) \
| eval avg_latency = round(avg_latency, 2)

# ============================================================================
# Report: Current Health Status (Quick View)
# ============================================================================
[Ping Monitor - Current Health Status]
action.email.useNSSubject = 1
alert.track = 0
description = Quick view of current health status for all endpoints. Uses index/sourcetype from Setup configuration.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = search [| inputlookup ping_monitor_settings_lookup \
| search _key="global" \
| head 1 \
| eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
| fields index, sourcetype \
| format] record_type=summary \
| stats latest(packet_loss_pct) as packet_loss, \
        latest(avg_latency_ms) as latency, \
        latest(target_ip) as ip, \
        latest(group) as group \
        by hostname \
| eval status = case( \
    packet_loss == 0, "Healthy", \
    packet_loss > 0 AND packet_loss < 50, "Degraded", \
    packet_loss >= 50 AND packet_loss < 100, "Critical", \
    packet_loss == 100, "Down" \
) \
| eval latency = round(latency, 2) \
| table status, hostname, ip, group, packet_loss, latency \
| rename status as \"Status\", packet_loss as \"Loss %\", latency as \"Latency (ms)\" \
| sort status

# ============================================================================
# Report: Metrics Summary (for Metrics index)
# ============================================================================
[Ping Monitor - Metrics Summary]
action.email.useNSSubject = 1
alert.track = 0
description = Summary of ping metrics data. Uses metrics_index from Setup configuration.
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = | mstats latest("ping.packet_loss_pct") as packet_loss, \
    latest("ping.avg_latency_ms") as latency \
    WHERE [| inputlookup ping_monitor_settings_lookup \
          | search _key="global" \
          | head 1 \
          | eval index=coalesce(metrics_index, "ping_metrics") \
          | fields index \
          | format] BY hostname, target_ip, group \
| eval status = case( \
    packet_loss == 0, "Healthy", \
    packet_loss > 0 AND packet_loss < 50, "Degraded", \
    packet_loss >= 50 AND packet_loss < 100, "Critical", \
    packet_loss == 100, "Down" \
) \
| eval latency = round(latency, 2) \
| table status, hostname, target_ip, group, packet_loss, latency \
| rename status as \"Status\", packet_loss as \"Loss %\", latency as \"Latency (ms)\" \
| sort status
