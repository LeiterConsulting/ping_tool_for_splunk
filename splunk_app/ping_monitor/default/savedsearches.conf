| eval avg_latency_ms = round(avg_latency_ms, 2) \
| eval last_seen_human = strftime(last_seen, "%Y-%m-%d %H:%M:%S") \
| sort -current_loss, hostname \
| table hostname, target_ip, group, entitytype, current_loss, average_loss, avg_latency_ms, last_seen_human \
| appendpipe [ \
    stats count \
    | where count=0 \
    | eval hostname="No endpoints currently above the packet loss threshold", target_ip="", group="", entitytype="", current_loss="", average_loss="", avg_latency_ms="", last_seen_human="" \
    | table hostname, target_ip, group, entitytype, current_loss, average_loss, avg_latency_ms, last_seen_human \
] \
| rename target_ip as "IP Address" current_loss as "Current Loss %" average_loss as "Average Loss %" avg_latency_ms as "Average Latency (ms)" last_seen_human as "Last Seen"

