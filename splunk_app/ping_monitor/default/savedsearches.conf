# ============================================================================
# Report: Current health lookup contents
# ============================================================================
[Ping Monitor - Health Lookup Status]
action.email.useNSSubject = 1
alert.track = 0
description = Current contents of the ping_health_lookup KV Store collection used by the correlation dashboard.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = | inputlookup ping_health_lookup \
| eval packet_loss_pct = round(packet_loss_pct, 2) \
| eval avg_latency_ms = round(avg_latency_ms, 2) \
| sort health_status, hostname \
| table hostname, target_ip, group, entitytype, health_status, packet_loss_pct, avg_latency_ms, last_updated \
| appendpipe [ \
    stats count \
    | where count=0 \
    | eval hostname="Health lookup is empty", target_ip="", group="", entitytype="", health_status="", packet_loss_pct="", avg_latency_ms="", last_updated="" \
    | table hostname, target_ip, group, entitytype, health_status, packet_loss_pct, avg_latency_ms, last_updated \
] \
| rename target_ip as "IP Address" health_status as "Health Status" packet_loss_pct as "Packet Loss %" avg_latency_ms as "Average Latency (ms)" last_updated as "Last Updated"
