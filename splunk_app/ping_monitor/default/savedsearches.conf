# ============================================================================
# Report: Daily Availability Summary
# ============================================================================
[Ping Monitor - Daily Availability Report]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 8 * * *
description = Daily availability summary for all monitored endpoints using the latest summary data in the configured events index.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = `ping_summaries` \
| stats latest(target_ip) as target_ip, \
        latest(group) as group, \
        latest(entitytype) as entitytype, \
        sum(pings_successful) as success, \
        sum(pings_sent) as total, \
        avg(avg_latency_ms) as avg_latency_ms, \
        max(max_latency_ms) as max_latency_ms, \
        max(packet_loss_pct) as worst_packet_loss \
        by hostname \
| where total > 0 \
| eval availability = round((success/total)*100, 2) \
| eval avg_latency_ms = round(avg_latency_ms, 2) \
| eval max_latency_ms = round(max_latency_ms, 2) \
| eval worst_packet_loss = round(worst_packet_loss, 2) \
| eval status = case( \
    availability >= 99.9, "Healthy", \
    availability >= 95, "Degraded", \
    availability >= 90, "Critical", \
    true(), "Down" \
) \
| sort -availability, hostname \
| table hostname, target_ip, group, entitytype, status, availability, avg_latency_ms, max_latency_ms, worst_packet_loss, total \
| appendpipe [ \
    stats count \
    | where count=0 \
    | eval hostname="No daily summary data found", target_ip="", group="", entitytype="", status="", availability="", avg_latency_ms="", max_latency_ms="", worst_packet_loss="", total="" \
    | table hostname, target_ip, group, entitytype, status, availability, avg_latency_ms, max_latency_ms, worst_packet_loss, total \
] \
| rename target_ip as "IP Address" status as "Status" availability as "Availability %" avg_latency_ms as "Average Latency (ms)" max_latency_ms as "Peak Latency (ms)" worst_packet_loss as "Worst Packet Loss %" total as "Samples"

# ============================================================================
# Report: Weekly Trend Report
# ============================================================================
[Ping Monitor - Weekly Trend Report]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 9 * * 1
description = Seven-day fleet trend summary for availability, latency, and issue volume based on ping summary events.
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = `ping_summaries` \
| bin _time span=1d \
| stats sum(pings_successful) as success, \
        sum(pings_sent) as total, \
        avg(avg_latency_ms) as avg_latency_ms, \
        dc(hostname) as active_hosts, \
        count(eval(packet_loss_pct > 0)) as degraded_samples, \
        count(eval(packet_loss_pct >= 50)) as critical_samples \
        by _time \
| where total > 0 \
| eval date = strftime(_time, "%Y-%m-%d") \
| eval availability = round((success/total)*100, 2) \
| eval avg_latency_ms = round(avg_latency_ms, 2) \
| sort date \
| table date, active_hosts, availability, avg_latency_ms, degraded_samples, critical_samples, total \
| appendpipe [ \
    stats count \
    | where count=0 \
    | eval date="No weekly trend data found", active_hosts="", availability="", avg_latency_ms="", degraded_samples="", critical_samples="", total="" \
    | table date, active_hosts, availability, avg_latency_ms, degraded_samples, critical_samples, total \
] \
| rename active_hosts as "Active Hosts" availability as "Availability %" avg_latency_ms as "Average Latency (ms)" degraded_samples as "Degraded Samples" critical_samples as "Critical Samples" total as "Samples"

# ============================================================================
# Report: Current Health Status (Quick View)
# ============================================================================
[Ping Monitor - Current Health Status]
action.email.useNSSubject = 1
alert.track = 0
description = Current endpoint health rollup based on the latest summary event seen for each hostname.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = `ping_summaries` \
| stats latest(_time) as last_check, \
        latest(packet_loss_pct) as packet_loss, \
        latest(avg_latency_ms) as latency, \
        latest(target_ip) as target_ip, \
        latest(group) as group, \
        latest(entitytype) as entitytype, \
        latest(device) as device, \
        latest(vendor) as vendor \
        by hostname \
| eval health_status = case( \
    packet_loss == 0, "Healthy", \
    packet_loss > 0 AND packet_loss < 50, "Degraded", \
    packet_loss >= 50 AND packet_loss < 100, "Critical", \
    packet_loss == 100, "Down", \
    true(), "Unknown" \
) \
| eval packet_loss = round(packet_loss, 2) \
| eval latency = if(isnull(latency), null(), round(latency, 2)) \
| eval last_check_human = strftime(last_check, "%Y-%m-%d %H:%M:%S") \
| sort health_status, hostname \
| table hostname, target_ip, health_status, packet_loss, latency, group, entitytype, device, vendor, last_check_human \
| appendpipe [ \
    stats count \
    | where count=0 \
    | eval hostname="No current health data found", target_ip="", health_status="", packet_loss="", latency="", group="", entitytype="", device="", vendor="", last_check_human="" \
    | table hostname, target_ip, health_status, packet_loss, latency, group, entitytype, device, vendor, last_check_human \
] \
| rename target_ip as "IP Address" health_status as "Health Status" packet_loss as "Packet Loss %" latency as "Latency (ms)" last_check_human as "Last Check"

# ============================================================================
# Report: Metrics Summary (for Metrics index)
# ============================================================================
[Ping Monitor - Metrics Summary]
action.email.useNSSubject = 1
alert.track = 0
description = Current metrics-based status summary using the configured metrics index.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = | mstats latest("ping.packet_loss_pct") as packet_loss, \
    latest("ping.avg_latency_ms") as current_latency_ms, \
    avg("ping.avg_latency_ms") as avg_latency_ms, \
    max("ping.max_latency_ms") as max_latency_ms, \
    sum("ping.pings_successful") as success, \
    sum("ping.pings_sent") as total \
    WHERE `ping_metrics_filter` BY hostname, target_ip, group span=5m \
| stats latest(packet_loss) as packet_loss, \
        latest(current_latency_ms) as current_latency_ms, \
        avg(avg_latency_ms) as avg_latency_ms, \
        max(max_latency_ms) as max_latency_ms, \
        sum(success) as success, \
        sum(total) as total \
        by hostname, target_ip, group \
| where total > 0 \
| eval availability = round((success/total)*100, 2) \
| eval current_latency_ms = round(current_latency_ms, 2) \
| eval avg_latency_ms = round(avg_latency_ms, 2) \
| eval max_latency_ms = round(max_latency_ms, 2) \
| eval packet_loss = round(packet_loss, 2) \
| eval health_status = case( \
    packet_loss == 0, "Healthy", \
    packet_loss > 0 AND packet_loss < 50, "Degraded", \
    packet_loss >= 50 AND packet_loss < 100, "Critical", \
    packet_loss == 100, "Down", \
    true(), "Unknown" \
) \
| sort health_status, hostname \
| table hostname, target_ip, group, health_status, availability, packet_loss, current_latency_ms, avg_latency_ms, max_latency_ms \
| appendpipe [ \
    stats count \
    | where count=0 \
    | eval hostname="No metrics summary data found", target_ip="", group="", health_status="", availability="", packet_loss="", current_latency_ms="", avg_latency_ms="", max_latency_ms="" \
    | table hostname, target_ip, group, health_status, availability, packet_loss, current_latency_ms, avg_latency_ms, max_latency_ms \
] \
| rename target_ip as "IP Address" health_status as "Health Status" availability as "Availability %" packet_loss as "Packet Loss %" current_latency_ms as "Current Latency (ms)" avg_latency_ms as "Average Latency (ms)" max_latency_ms as "Peak Latency (ms)"

# ============================================================================
# Report: Review endpoints currently down
# ============================================================================
[Ping Monitor - Endpoint Down Review]
action.email.useNSSubject = 1
alert.track = 0
description = Operator-facing review of endpoints whose latest summary event indicates they are down.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = `ping_summaries` \
| stats latest(_time) as last_seen, \
        latest(packet_loss_pct) as packet_loss, \
        latest(avg_latency_ms) as avg_latency_ms, \
        latest(target_ip) as target_ip, \
        latest(group) as group, \
        latest(entitytype) as entitytype \
        by hostname \
| where packet_loss == 100 \
| eval avg_latency_ms = round(avg_latency_ms, 2) \
| eval last_seen_human = strftime(last_seen, "%Y-%m-%d %H:%M:%S") \
| sort hostname \
| table hostname, target_ip, group, entitytype, packet_loss, avg_latency_ms, last_seen_human \
| appendpipe [ \
    stats count \
    | where count=0 \
    | eval hostname="No endpoints currently down", target_ip="", group="", entitytype="", packet_loss="", avg_latency_ms="", last_seen_human="" \
    | table hostname, target_ip, group, entitytype, packet_loss, avg_latency_ms, last_seen_human \
] \
| rename target_ip as "IP Address" packet_loss as "Packet Loss %" avg_latency_ms as "Average Latency (ms)" last_seen_human as "Last Seen"

# ============================================================================
# Report: Review endpoints with high packet loss
# ============================================================================
[Ping Monitor - High Packet Loss Review]
action.email.useNSSubject = 1
alert.track = 0
description = Operator-facing review of endpoints with elevated packet loss in their latest summary status.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 0
request.ui_dispatch_app = ping_monitor
request.ui_dispatch_view = search
search = `ping_summaries` \
| stats latest(_time) as last_seen, \
        latest(packet_loss_pct) as current_loss, \
        avg(packet_loss_pct) as average_loss, \
        latest(avg_latency_ms) as avg_latency_ms, \
        latest(target_ip) as target_ip, \
        latest(group) as group, \
        latest(entitytype) as entitytype \
        by hostname \
| where current_loss >= 25 AND current_loss < 100 \
| eval current_loss = round(current_loss, 2) \
