# ============================================================================
# Ping Monitor - Search Macros
# ============================================================================
# These macros read configuration from ping_monitor.conf
# ============================================================================

# ----------------------------------------------------------------------------
# Core ping data access
# ----------------------------------------------------------------------------
# Splunk Cloud users often don't have REST capabilities, and the app's
# configuration is managed via KV Store (Setup dashboard). Avoid `rest` usage.

# Ping events (uses KV Store configuration when present)
[ping_events]
definition = [| inputlookup ping_monitor_settings_lookup \
    | search _key="global" \
    | head 1 \
    | eval index=coalesce(index, "ping"), sourcetype=coalesce(sourcetype, "ping_monitor") \
    | fields index, sourcetype \
    | format]

[ping_events(2)]
args = index, sourcetype
definition = index=$index$ sourcetype=$sourcetype$

[ping_summaries]
definition = `ping_events` record_type=summary

[ping_summaries(2)]
args = index, sourcetype
definition = `ping_events($index$, $sourcetype$)` record_type=summary

# ----------------------------------------------------------------------------
# Ping individual pings
# ----------------------------------------------------------------------------
[ping_details]
definition = `ping_events` record_type=ping

# ----------------------------------------------------------------------------
# Metrics queries
# ----------------------------------------------------------------------------
[ping_metrics(2)]
args = metrics_index, span
definition = | mstats avg(ping.avg_latency_ms) AS avg_latency_ms, \
    max(ping.max_latency_ms) AS max_latency_ms, \
    min(ping.min_latency_ms) AS min_latency_ms, \
    avg(ping.packet_loss_pct) AS packet_loss_pct, \
    sum(ping.pings_sent) AS pings_sent, \
    sum(ping.pings_successful) AS pings_successful \
    WHERE index=$metrics_index$ span=$span$ \
    BY hostname, target_ip, group, description, entitytype, device, vendor, additional_notes

[ping_metrics]
definition = `ping_metrics(ping_metrics, 1m)`

# ----------------------------------------------------------------------------
# Union of events and metrics
# ----------------------------------------------------------------------------
[ping_data_union(4)]
args = events_index, sourcetype, metrics_index, span
definition = (`ping_summaries($events_index$, $sourcetype$)` \
    | eval data_source="events" \
    | fields _time, hostname, target_ip, group, description, entitytype, device, vendor, additional_notes, \
             avg_latency_ms, min_latency_ms, max_latency_ms, packet_loss_pct, pings_sent, pings_successful, data_source) \
    | append [ \
        `ping_metrics($metrics_index$, $span$)` \
        | eval data_source="metrics" \
        | fields _time, hostname, target_ip, group, description, entitytype, device, vendor, additional_notes, \
                 avg_latency_ms, min_latency_ms, max_latency_ms, packet_loss_pct, pings_sent, pings_successful, data_source \
    ]

[ping_data_union]
definition = `ping_data_union(ping, ping_monitor, ping_metrics, 1m)`

# ----------------------------------------------------------------------------
# Asset inventory from ping data
# ----------------------------------------------------------------------------
[ping_asset_inventory]
definition = `ping_summaries` \
    | stats latest(_time) AS last_seen, \
            latest(avg_latency_ms) AS last_latency, \
            latest(packet_loss_pct) AS last_loss, \
            avg(packet_loss_pct) AS avg_loss, \
            avg(avg_latency_ms) AS avg_latency, \
            values(group) AS groups, \
            values(description) AS description, \
            values(entitytype) AS entitytype, \
            values(device) AS device, \
            values(vendor) AS vendor \
        BY hostname, target_ip \
    | eval health_status=case( \
        last_loss==0, "healthy", \
        last_loss>0 AND last_loss<50, "degraded", \
        last_loss>=50, "critical", \
        true(), "unknown") \
    | eval last_seen_human=strftime(last_seen, "%Y-%m-%d %H:%M:%S")

# ----------------------------------------------------------------------------
# Helper macros
# ----------------------------------------------------------------------------
[ping_latest_status]
definition = `ping_summaries` | stats latest(*) AS * by hostname, target_ip

[ping_endpoints_with_issues]
definition = `ping_summaries` earliest=-1h \
    | stats avg(packet_loss_pct) AS avg_loss by hostname, target_ip \
    | where avg_loss > 0 \
    | sort -avg_loss

[ping_availability_trend(1)]
args = span
definition = `ping_summaries` \
    | timechart span=$span$ avg(eval(100-packet_loss_pct)) AS availability

[ping_latency_trend(1)]
args = span
definition = `ping_summaries` \
    | timechart span=$span$ avg(avg_latency_ms) AS avg_latency by hostname
