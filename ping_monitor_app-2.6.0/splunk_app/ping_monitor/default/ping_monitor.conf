#
# Ping Monitor Configuration
#

[ping_data]
# Index containing ping event data
events_index = main

# Sourcetype for ping events
events_sourcetype = ping_monitor

# Metrics index (metrics-type index for mstats)
metrics_index = ping_metrics

# Default span for metrics aggregation
metrics_span = 1m

[correlation]
# Enable automatic discovery of related data sources
auto_discover = true

# Indexes to search for correlated data (comma-separated, or * for all)
# Leave empty to auto-discover
correlation_indexes = 

# Maximum age of data to consider for correlation discovery
discovery_timerange = -24h

# Fields to use for asset matching
match_fields = ip,hostname,host,src_ip,dest_ip,src,dest,src_host,dest_host,dvc,dvc_ip
