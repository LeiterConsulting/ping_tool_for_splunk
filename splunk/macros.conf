# ============================================================================
# Splunk Ping Monitor - Macros Configuration
# ============================================================================
# These macros enable dual-mode dashboard queries that work with both
# event-based and metrics-based ping data.
#
# Installation:
#   1. Copy this file to $SPLUNK_HOME/etc/apps/search/local/macros.conf
#   2. Or create a dedicated app: $SPLUNK_HOME/etc/apps/ping_monitor/local/macros.conf
#   3. Restart Splunk or refresh macros: | rest /services/admin/macros
#
# Usage in searches:
#   `ping_summary_events` 
#   `ping_summary_metrics`
#   `ping_data_union`
# ============================================================================

# ----------------------------------------------------------------------------
# Event-based summary data
# Fetches ping summary records from the events index
# Arguments: index (e.g., "ping"), sourcetype (e.g., "ping_monitor")
# ----------------------------------------------------------------------------
[ping_summary_events(2)]
args = index, sourcetype
definition = index=$index$ sourcetype=$sourcetype$ record_type=summary

# No-argument version using defaults
[ping_summary_events]
definition = `ping_summary_events(ping, ping_monitor)`

# ----------------------------------------------------------------------------
# Metrics-based summary data
# Fetches ping metrics using mstats for aggregation
# Arguments: metrics_index (e.g., "ping_metrics"), span (e.g., "1m")
# ----------------------------------------------------------------------------
[ping_summary_metrics(2)]
args = metrics_index, span
definition = | mstats avg(ping.avg_latency_ms) AS avg_latency_ms, \
    max(ping.max_latency_ms) AS max_latency_ms, \
    min(ping.min_latency_ms) AS min_latency_ms, \
    avg(ping.packet_loss_pct) AS packet_loss_pct, \
    sum(ping.pings_sent) AS pings_sent, \
    sum(ping.pings_successful) AS pings_successful \
    WHERE index=$metrics_index$ BY hostname, target_ip, group, description, entitytype, device, vendor, additional_notes span=$span$

# No-argument version using defaults
[ping_summary_metrics]
definition = `ping_summary_metrics(ping_metrics, 1m)`

# ----------------------------------------------------------------------------
# Unified data source
# Union of events and metrics for seamless historical queries
# Works across transition periods where some data is events, some is metrics
# Arguments: events_index, sourcetype, metrics_index, span
# ----------------------------------------------------------------------------
[ping_data_union(4)]
args = events_index, sourcetype, metrics_index, span
definition = (`ping_summary_events($events_index$, $sourcetype$)` \
    | eval data_source="events" \
    | eval timestamp=coalesce(timestamp, strftime(_time, "%Y-%m-%dT%H:%M:%S")) \
    | fields _time, timestamp, hostname, target_ip, group, description, entitytype, device, vendor, additional_notes, \
             avg_latency_ms, min_latency_ms, max_latency_ms, packet_loss_pct, pings_sent, pings_successful, data_source) \
    | append [ \
        `ping_summary_metrics($metrics_index$, $span$)` \
        | eval data_source="metrics" \
        | eval timestamp=strftime(_time, "%Y-%m-%dT%H:%M:%S") \
        | fields _time, timestamp, hostname, target_ip, group, description, entitytype, device, vendor, additional_notes, \
                 avg_latency_ms, min_latency_ms, max_latency_ms, packet_loss_pct, pings_sent, pings_successful, data_source \
    ]

# No-argument version using defaults
[ping_data_union]
definition = `ping_data_union(ping, ping_monitor, ping_metrics, 1m)`

# ----------------------------------------------------------------------------
# Helper macros for common dashboard queries
# ----------------------------------------------------------------------------

# Latest status for all endpoints (from events)
[ping_latest_status]
definition = `ping_summary_events` | stats latest(*) AS * by hostname, target_ip

# Packet loss trend over time
[ping_loss_trend(1)]
args = span
definition = `ping_summary_events` | timechart span=$span$ avg(packet_loss_pct) by hostname

# Average latency by group
[ping_latency_by_group]
definition = `ping_summary_events` | stats avg(avg_latency_ms) AS avg_latency by group | sort -avg_latency

# Endpoints with issues (>0% packet loss in last hour)
[ping_endpoints_with_issues]
definition = `ping_summary_events` earliest=-1h | stats avg(packet_loss_pct) AS avg_loss by hostname, target_ip | where avg_loss > 0 | sort -avg_loss
