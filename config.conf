# ============================================================================
# Splunk Ping Monitor - Unix Shell Runtime Configuration
# ============================================================================
# This file is used by ping_monitor.sh.
# Go v5 (pingmonitor.exe) does NOT read config.conf; use config.psd1,
# config.yaml, or config.json for the Go runtime.
# ============================================================================

# ----------------------------------------------------------------------------
# Core cycle settings
# ----------------------------------------------------------------------------
PINGS_PER_CYCLE=4
CYCLE_INTERVAL=60
PING_TIMEOUT=2

# ----------------------------------------------------------------------------
# Event settings
# ----------------------------------------------------------------------------
# The shell runtime defaults to summary-only behavior.
EMIT_INDIVIDUAL_PINGS="false"

# ----------------------------------------------------------------------------
# Output settings
# ----------------------------------------------------------------------------
OUTPUT_MODE="file"             # file | hec | both
LOG_PATH="./logs/ping_results.log"
LOG_ROTATION_SIZE_MB=50

# ----------------------------------------------------------------------------
# Splunk HEC (events)
# ----------------------------------------------------------------------------
HEC_URL=""
HEC_TOKEN=""
HEC_INDEX="main"
HEC_SOURCETYPE="ping_monitor"
HEC_VERIFY_SSL="true"
HEC_TLS_VERSION="default"

HEC_BATCH_SIZE=100
HEC_MAX_BUFFER_EVENTS=5000
HEC_RETRY_ENABLED="true"
HEC_RETRY_MAX_ATTEMPTS=3
HEC_RETRY_BASE_DELAY_MS=250
HEC_RETRY_BACKOFF="exponential"

# ----------------------------------------------------------------------------
# Splunk metrics
# ----------------------------------------------------------------------------
METRICS_ENABLED="false"
METRICS_MODE="dual"            # dual | metrics_only
METRICS_INDEX=""
METRICS_HEC_URL=""
METRICS_HEC_TOKEN=""
METRICS_VERIFY_SSL="true"
METRICS_TLS_VERSION="default"
METRICS_SOURCETYPE="ping_monitor:metrics"

# ----------------------------------------------------------------------------
# Runtime toggles
# ----------------------------------------------------------------------------
RUN_ONCE="false"
VERBOSE="false"
